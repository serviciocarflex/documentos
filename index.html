<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Documentos | Carflex</title>
    <style>
        :root {
            --primary: #ff7225;
            --primary-dark: #e65a15;
            --text: #1f2937;
            --muted: #6b7280;
            --green: #4CAF50;
            --border: #e5e7eb;
        }

        /* RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #f3f4f6;
        }

        /* FONDO */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('fondo formulario.jpg') center/cover no-repeat;
            filter: brightness(.55) blur(4px);
            z-index: -1;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, .98);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, .3);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fade .4s ease-out;
        }

        .logo {
            width: 160px;
            margin-bottom: 20px;
        }

        h2 {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 25px;
        }

        /* INPUTS PRINCIPALES */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group > span {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        input[type=text], input[type=email] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 15px;
            outline: none;
            transition: all .3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 114, 37, 0.1);
        }

        /* --- FILAS DE CHECKBOX CLIQUEABLES --- */
        .checkbox-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .checkbox-item {
            margin-bottom: 8px;
        }

        /* El label ahora envuelve a todo, lo que lo hace cliqueable */
        .checkbox-label {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none; /* Evita que se seleccione el texto al hacer clic rápido */
        }

        .checkbox-label:hover {
            background-color: #f9fafb;
            border-color: #d1d5db;
        }

        /* Estilo cuando el checkbox interno está marcado */
        .checkbox-item input[type="checkbox"]:checked + .checkbox-label {
            border-color: var(--green);
            background-color: #f0fdf4; /* Un verde muy clarito de fondo */
        }

        /* Ocultamos el checkbox real pero mantenemos su funcionalidad */
        .checkbox-item input[type="checkbox"] {
            display: none;
        }

        /* Creamos nuestro propio cuadradito visual */
        .custom-box {
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            background: white;
        }

        /* Estilo del cuadradito cuando está marcado */
        .checkbox-item input[type="checkbox"]:checked + .checkbox-label .custom-box {
            background-color: var(--green);
            border-color: var(--green);
        }

        /* El check (v) blanco */
        .custom-box::after {
            content: "";
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            display: none;
            margin-bottom: 2px;
        }

        .checkbox-item input[type="checkbox"]:checked + .checkbox-label .custom-box::after {
            display: block;
        }

        .label-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        /* BOTONES */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
        }

        button:hover { background: var(--primary-dark); transform: translateY(-1px); }
        button:disabled { opacity: .6; cursor: not-allowed; }

        /* MENSAJES */
        .msg { margin-top: 18px; font-size: 14px; min-height: 20px; }
        .error { background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: 10px; border: 1px solid #fee2e2; }

        /* EXITO */
        .success-screen { display: none; text-align: center; }
        .success-icon { font-size: 60px; margin-bottom: 20px; display: block; }
        .btn-secondary { background: #374151; }

        @keyframes fade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div id="form-screen">
        <img src="Logo carflex.jpg" class="logo" alt="Carflex">
        <h2>Portal de Documentos</h2>
        <p class="subtitle">Solicita tus documentos vehiculares aquí.</p>

        <form id="form">
            <div class="input-group">
                <span>Patente</span>
                <input id="patente" type="text" placeholder="Ej: AB123C" maxlength="6" required autocomplete="off">
            </div>

            <div class="input-group">
                <span>Correo Electrónico</span>
                <input id="correo" type="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <span>Tipo de Documento</span>
                <ul class="checkbox-list">
                    <li class="checkbox-item">
                        <input type="checkbox" id="tipoSOAP" name="tipo" value="SOAP">
                        <label for="tipoSOAP" class="checkbox-label">
                            <div class="custom-box"></div>
                            <span class="label-text">SOAP</span>
                        </label>
                    </li>
                    <li class="checkbox-item">
                        <input type="checkbox" id="tipoPC" name="tipo" value="PC">
                        <label for="tipoPC" class="checkbox-label">
                            <div class="custom-box"></div>
                            <span class="label-text">Permiso de Circulación</span>
                        </label>
                    </li>
                    <li class="checkbox-item">
                        <input type="checkbox" id="tipoMANT" name="tipo" value="MANTENCION">
                        <label for="tipoMANT" class="checkbox-label">
                            <div class="custom-box"></div>
                            <span class="label-text">Certificado Última Mantención</span>
                        </label>
                    </li>
                </ul>
            </div>

            <button type="submit" id="btn-submit">Solicitar Certificado</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>

    <div id="success-screen" class="success-screen">
        <span class="success-icon">✅</span>
        <h3>Solicitud enviada</h3>
        <p>El certificado fue enviado al correo:<br><strong id="correo-confirmado"></strong></p>
        <button class="btn-secondary" onclick="resetForm()">Solicitar otro certificado</button>
    </div>
</div>

<script>
    const WEBHOOK_URL = "https://uncollapsible-melodiously-chung.ngrok-free.dev/webhook/certificado";

    function normalizarPatente(v) { return v.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6); }
    function patenteValida(p) { return /^[A-Z]{4}[0-9]{2}$/.test(p) || /^[A-Z]{2}[0-9]{4}$/.test(p) || /^[A-Z]{2}[0-9]{2}[A-Z]{2}$/.test(p); }

    const inputPatente = document.getElementById("patente");
    inputPatente.addEventListener("input", e => { e.target.value = normalizarPatente(e.target.value); });

    document.getElementById("form").addEventListener("submit", async e => {
        e.preventDefault();
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btn-submit");
        const patente = inputPatente.value;
        const correo = document.getElementById("correo").value;
        const tipos = Array.from(document.querySelectorAll('input[name="tipo"]:checked')).map(cb => cb.value);

        if (!patenteValida(patente)) {
            msg.className = "msg error";
            msg.innerHTML = "Formato de patente inválido.";
            return;
        }

        if (tipos.length === 0) {
            msg.className = "msg error";
            msg.innerHTML = "Debe seleccionar al menos un tipo de documento.";
            return;
        }

        msg.className = "msg";
        msg.innerHTML = "Procesando...";
        btn.disabled = true;

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ patente, correo, tipos })
            });
            if (!response.ok) throw new Error();
            document.getElementById("correo-confirmado").textContent = correo;
            document.getElementById("form-screen").style.display = "none";
            document.getElementById("success-screen").style.display = "block";
        } catch (err) {
            msg.className = "msg error";
            msg.innerHTML = "Error de conexión. Intente nuevamente.";
        }
        btn.disabled = false;
    });

    function resetForm() {
        document.getElementById("form").reset();
        document.getElementById("success-screen").style.display = "none";
        document.getElementById("form-screen").style.display = "block";
        document.getElementById("msg").innerHTML = "";
    }
</script>

</body>
</html>
